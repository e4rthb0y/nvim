name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      
      - name: Stylua
        uses: JohnnyMorganz/stylua-action@v5.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          args: --check .
